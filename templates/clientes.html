<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CLIENTES - Pollitos Titi</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
body{
    font-family: 'Nunito', sans-serif;
    background:#fff5e6;
    margin:0;
}

header{
    background:#cc0000;
    color:white;
    text-align:center;
    padding:20px;
}

.formulario{
    background:white;
    width:400px;
    margin:40px auto;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 4px 12px rgba(0,0,0,0.2);
}

input{
    width:95%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

.boton{
    background:#cc0000;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:5px;
    cursor:pointer;
    width:100%;
}

.volver{
    text-align:center;
    margin-top:20px;
}
</style>

</head>
<body>

<header>
    <h1>Registro de Clientes</h1>
</header>

<div class="formulario">

    <h2>Únete a Pollitos Titi</h2>

    <input type="text" placeholder="Nombre">

    <input type="text" placeholder="Apellido">

    <input type="email" placeholder="Correo Electrónico">

    <input type="tel" placeholder="Teléfono">

   <button class="boton" onclick="alert('Cliente registrado correctamente')">
    Registrarse
</button>
</div>

<div class="volver">
    <a href="/">Volver al inicio</a>
</div>

</body>
</html>

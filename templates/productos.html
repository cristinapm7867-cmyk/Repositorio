<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Productos - Pollitos Titi</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
body{
    font-family: 'Nunito', sans-serif;
    background:#fff5e6;
    margin:0;
}

header{
    background:#cc0000;
    color:white;
    text-align:center;
    padding:20px;
}

.productos{
    text-align:center;
    padding:40px;
}

.card{
    
    background:white;
    width:280px;
    display:inline-block;
    margin:15px;
    border-radius:10px;
    box-shadow:0px 0px 10px gray;
    vertical-align:top;

}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.card h3{
    color:#cc0000;
}

.boton{
    background:#cc0000;
    color:white;
    border:none;
    padding:10px 20px;
    margin-bottom:15px;
    border-radius:5px;
    cursor:pointer;
}
</style>

</head>
<body>

<header>
    <h1>Nuestros Productos</h1>
</header>

<section class="productos">

    <div class="card">
        <img src="https://www.circuitogastronomico.com/wp-content/uploads/2022/10/bigrooster-2.jpg" alt="Combo Personal">
        <h3>Combo Personal</h3>
        <p>S/ 18.00</p>
        <a href="/clientes">
    <button class="boton">Comprar</button>
</a>
</div>

    <div class="card">
        <img src="https://i.pinimg.com/1200x/45/e3/56/45e356c1d27b1eeb4081b3068e2a4c74.jpg" alt="Combo Familiar">
        <h3>Combo Familiar</h3>
        <p>S/ 55.00</p>
        <a href="/clientes">
    <button class="boton">Comprar</button>
</a>
</div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1626645738196-c2a7c87a8f58">
        <h3>Mega Bucket</h3>
        <p>S/ 75.00</p>
       <a href="/clientes">
    <button class="boton">Comprar</button>
</a>
</div>

</section>

<center>
    <a href="/">Volver al inicio</a>
</center>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login - POLLITOS TITI</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#fff5e6;
    margin:0;
}

header{
    background:#cc0000;
    color:white;
    text-align:center;
    padding:20px;
}

.login{
    background:white;
    width:350px;
    margin:50px auto;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 4px 12px rgba(0,0,0,0.2);
}

input{
    width:95%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

.boton{
    background:#cc0000;
    color:white;
    border:none;
    padding:12px;
    width:100%;
    border-radius:5px;
    cursor:pointer;
}

.volver{
    text-align:center;
    margin-top:20px;
}
</style>

</head>
<body>

<header>
    <h1>INICIAR SESION</h1>
</header>

<div class="login">

    <h2>BIENVENIDO A POLLITOS TITI</h2>

    <input type="text" placeholder="USUARIO">

    <input type="password" placeholder="CONTRASEÑA">

    <button class="boton">Ingresar</button>

</div>

<div class="volver">
    <a href="/">Volver al inicio</a>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Servicios - Pollitos Titi</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
body{
    font-family: 'Nunito', sans-serif;
    background:#fff5e6;
    margin:0;
}

header{
    background:#cc0000;
    color:white;
    text-align:center;
    padding:20px;
}

.servicios{
    text-align:center;
    padding:40px;
}

.card{
    background:white;
    width:280px;
    display:inline-block;
    margin:15px;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0px 4px 12px rgba(0,0,0,0.2);
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.card h3{
    color:#cc0000;
}

.boton{
    background:#cc0000;
    color:white;
    border:none;
    padding:10px 20px;
    margin-bottom:15px;
    border-radius:5px;
    cursor:pointer;
}
</style>

</head>
<body>

<header>
    <h1>Nuestros Servicios</h1>
</header>

<section class="servicios">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1556740749-887f6717d7e4">
        <h3>Delivery Express</h3>
        <p>Recibe tu pedido en la puerta de tu casa.</p>
        <a href="/clientes">
    <button class="boton">Solicitar</button>
</a>
</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1521791136064-7986c2920216">
        <h3>Recojo en Tienda</h3>
        <p>Haz tu pedido y recógelo sin esperar.</p>
       <a href="/clientes">
    <button class="boton">Solicitar</button>
</a>
</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4">
        <h3>Atención en Salón</h3>
        <p>Disfruta de nuestros ambientes cómodos y familiares.</p>
        <a href="/clientes">
    <button class="boton">Solicitar</button>
</a>
</button>
    </div>

</section>

<center>
    <a href="/">Volver al inicio</a>
</center>

</body>
</html>
